<!DOCTYPE html>
                        <html lang='es'>
                        <head>
                        <meta charset='UTF-8'>
                        <meta name='viewport' content='width=device-width, initial-scale=1.0'>
                        <title>Mapa Geo</title>
                        <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'/>
                        <style>
                          *{margin:0;padding:0;box-sizing:border-box;}
                          body{font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;height:100vh;}
                          #cab{background:#fff;border-bottom:1px solid #dde2ea;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
                          #cab h2{font-size:14px;font-weight:700;color:#1e293b;flex:1;}
                          #inf{font-size:11px;color:#64748b;}
                          #tot{font-size:11px;color:#16a34a;font-weight:700;}
                          #mapa{flex:1;}
                          .leaflet-tooltip-custom{background:rgba(15,23,42,.88);color:#f1f5f9;border:none;border-radius:6px;padding:5px 9px;font-size:11px;line-height:1.4;max-width:180px;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.3);}
                          .leaflet-tooltip-custom::before{display:none;}
                          .popup-content{font-size:12px;line-height:1.6;min-width:160px;}
                          .popup-content strong{font-size:13px;color:#1e293b;}
                          .popup-zona{color:#3b82f6;font-weight:600;}
                          .popup-total{color:#16a34a;font-weight:700;}
                        </style>
                        </head>
                        <body>
                        <div id='cab'>
                          <span style='font-size:16px'>📍</span>
                          <h2 id='titulo'>Mapa georreferenciado</h2>
                          <span id='inf'></span>
                          <span id='tot'></span>
                        </div>
                        <div id='mapa'></div>
                        <script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script>
                        <script>
                        const PALETA=['#3b82f6','#ef4444','#16a34a','#f59e0b','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316','#0ea5e9','#a855f7','#14b8a6'];
                        const datos=[{"FechaCc":"15/06/2026","Doi":"17879992","Nombre":"VALLES AVALOS BETTY                                                                                 ","Descripcion":"MCDO LOS PORTALES PSTO 143  LA RINCONADA","Zona":"MCDO PORTALES - PARADA ZELA","Total":265.0,"Distribucion":"Dismar[0]-Lider[1]","Latitud":-8.0874321,"Longitud":-79.002638},{"FechaCc":"15/06/2026","Doi":"17941925","Nombre":"ELENA JULIA MONZÓN DE PAREDES                                                                       ","Descripcion":"PSTO 75  MCDO LOS PORTALES","Zona":"MCDO PORTALES - PARADA ZELA","Total":105.62,"Distribucion":"Dismar[1]-Lider[1]","Latitud":-8.0871888,"Longitud":-79.0025554},{"FechaCc":"15/06/2026","Doi":"17942578","Nombre":"AVALOS DE SALINAS, EULOGIA BERTHA                                                                   ","Descripcion":"MCDO LOS PORTALES 229","Zona":"MCDO PORTALES - PARADA ZELA","Total":30.4,"Distribucion":"Dismar[1]-Lider[0]","Latitud":-8.0875377,"Longitud":-79.0028105},{"FechaCc":"15/06/2026","Doi":"18058852","Nombre":"LUCIANO FERREL MELVA EVELINA                                                                        ","Descripcion":"MCDOPORTALESPTO 68","Zona":"MCDO PORTALES - PARADA ZELA","Total":104.4,"Distribucion":"Dismar[1]-Lider[0]","Latitud":-8.0872045,"Longitud":-79.0026836},{"FechaCc":"15/06/2026","Doi":"18060355","Nombre":"ALVARADO VICTORIO, LUZ MARIA                                                                        ","Descripcion":"MCDO LOS PORTALES 212 - EL PORVENIR","Zona":"MCDO PORTALES - PARADA ZELA","Total":399.5,"Distribucion":"Dismar[1]-Lider[0]","Latitud":-8.0875195,"Longitud":-79.0028555},{"FechaCc":"15/06/2026","Doi":"18075252","Nombre":"HONORIO DE TORIBIO BERTHA IRENE                                                                     ","Descripcion":"PJE ZELA 1346 PORVENIR","Zona":"MCDO PORTALES - PARADA ZELA","Total":63.75,"Distribucion":"Dismar[1]-Lider[1]","Latitud":-8.0848699,"Longitud":-79.0009116},{"FechaCc":"15/06/2026","Doi":"18075616","Nombre":"ZAVALETA FLORES JAIME                                                                               ","Descripcion":"FCO DE ZELA 1350 PJE MCD STA ROSA                                     ","Zona":"MCDO PORTALES - PARADA ZELA","Total":177.0,"Distribucion":"Dismar[1]-Lider[0]","Latitud":-8.0848784,"Longitud":-78.99981},{"FechaCc":"15/06/2026","Doi":"18142764","Nombre":"CHUQUIMANGO MENDOZA HOMERO                                                                          ","Descripcion":"PSTO15-14  MCDO PORTALES  RINCONADA                                   ","Zona":"MCDO PORTALES - PARADA ZELA","Total":71.02,"Distribucion":"Dismar[1]-Lider[1]","Latitud":-8.0872299,"Longitud":-79.00272},{"FechaCc":"15/06/2026","Doi":"18172202","Nombre":"EDUARDO JUAN VEGA NEIRA                                                                             ","Descripcion":"PSTO 308 MCDO LOS PORTALES              ","Zona":"MCDO PORTALES - PARADA ZELA","Total":241.2,"Distribucion":"Dismar[1]-Lider[1]","Latitud":-8.0875748,"Longitud":-79.0028625},{"FechaCc":"15/06/2026","Doi":"18184337","Nombre":"VASQUES MURGA ROSA                                                                                  ","Descripcion":"PSTO 318 MCDO LOS PORTALES              ","Zona":"MCDO PORTALES - PARADA ZELA","Total":126.36,"Distribucion":"Dismar[1]-Lider[1]","Latitud":-8.0875643,"Longitud":-79.0028416},{"FechaCc":"15/06/2026","Doi":"26698888","Nombre":"JULCAMORO EVA, EVA                                                                                  ","Descripcion":"MERCADO LOS PORTALES 51 EL PORVERNIR","Zona":"MCDO PORTALES - PARADA ZELA","Total":413.28,"Distribucion":"Dismar[1]-Lider[1]","Latitud":-8.0873598,"Longitud":-79.0024055},{"FechaCc":"15/06/2026","Doi":"41372259","Nombre":"PARDO SAMAMES, VICTOR RANGEL                                                                        ","Descripcion":"MCDO PORTALES PSTO 70","Zona":"MCDO PORTALES - PARADA ZELA","Total":237.0,"Distribucion":"Dismar[1]-Lider[0]","Latitud":-8.0872685,"Longitud":-79.0028309},{"FechaCc":"15/06/2026","Doi":"42010388","Nombre":"TOLENTINO MANTILLA YASMIN                                                                           ","Descripcion":"MCDO LOS PORTALES PTO 64","Zona":"MCDO PORTALES - PARADA ZELA","Total":140.4,"Distribucion":"Dismar[1]-Lider[0]","Latitud":-8.0871317,"Longitud":-79.0026952},{"FechaCc":"15/06/2026","Doi":"70864640","Nombre":"CARDENAS BRICEÑO LETICIA                                                                            ","Descripcion":"MOD PORTALES 218 RINCONADA              ","Zona":"MCDO PORTALES - PARADA ZELA","Total":25.5,"Distribucion":"Dismar[0]-Lider[1]","Latitud":-8.0875513,"Longitud":-79.0028403}];
                        const mapa=L.map('mapa').setView([-9.5,-77.5],6);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(mapa);
                        const zonasUnicas=[...new Set(datos.map(p=>p.Zona))].sort();
                        const colorPorZona={};
                        zonasUnicas.forEach((z,i)=>colorPorZona[z]=PALETA[i%PALETA.length]);
                        let totalGeneral=0;
                        const bounds=[];
                        datos.forEach((p,idx)=>{
                          totalGeneral+=p.Total;
                          const num=idx+1;
                          const color=colorPorZona[p.Zona]||'#3b82f6';
                          const fs=num>=100?7:num>=10?8:10;
                          const icon=L.divIcon({className:'',html:`<svg width='26' height='26' viewBox='0 0 26 26'><circle cx='13' cy='13' r='11' fill='${color}' stroke='#fff' stroke-width='2'/><text x='13' y='13' text-anchor='middle' dominant-baseline='central' fill='#fff' font-size='${fs}' font-family='Segoe UI' font-weight='700'>${num}</text></svg>`,iconSize:[26,26],iconAnchor:[13,13]});
                          const marker=L.marker([p.Latitud,p.Longitud],{icon});
                          bounds.push([p.Latitud,p.Longitud]);
                          const palabras=p.Nombre.trim().split(/\s+/);
                          const l1=palabras.slice(0,2).join(' ');
                          const l2=palabras.slice(2).join(' ');
                          const distrib=p.Distribucion?`<br><span style='color:#94e4b0;font-size:10px'>${p.Distribucion}</span>`:'';
                          const total=p.Total?`<br><span style='color:#fbbf24;font-size:10px;font-weight:700'>S/ ${p.Total.toFixed(2)}</span>`:'';
                          marker.bindTooltip(`<span style='color:#fbbf24;font-weight:700'>#${num}</span> `+(l2?`<b>${l1}</b><br>${l2}${distrib}${total}`:`<b>${l1}</b>${distrib}${total}`),{permanent:false,direction:'top',offset:[0,-14],className:'leaflet-tooltip-custom'});
                          marker.bindPopup(`<div class='popup-content'><strong>#${num} — ${p.Nombre}</strong><br><span class='popup-zona'>📌 ${p.Zona}</span><br>📋 ${p.Descripcion}<br>🚚 ${p.Distribucion}<br><span class='popup-total'>💰 S/ ${p.Total.toFixed(2)}</span></div>`,{maxWidth:260});
                          marker.addTo(mapa);
                        });
                        if(bounds.length>0) mapa.fitBounds(bounds,{padding:[30,30]});
                        const zonaLabel=zonasUnicas.length===1?`Zona: ${zonasUnicas[0]}`:`${zonasUnicas.length} zonas`;
                        document.getElementById('titulo').textContent=`Mapa — ${zonaLabel}`;
                        document.getElementById('inf').textContent=`📍 ${datos.length} puntos`;
                        document.getElementById('tot').textContent=`Total: S/ ${totalGeneral.toFixed(2)}`;
                        </script>
                        </body>
                        </html>
