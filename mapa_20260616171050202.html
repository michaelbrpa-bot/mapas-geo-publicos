                        const mapa=L.map('mapa').setView([-9.5,-77.5],6);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
                          attribution:'OpenStreetMap',

                        const zonasUnicas=[...new Set(datosMapa.map(p => p.Zona || 'SIN ZONA'))].sort();
                        const colorPorZona={};
                        zonasUnicas.forEach((z,i)=> colorPorZona[z]=PALETA[i % PALETA.length]);

                        const bounds=[];

                        datosMapa.forEach((p,idx)=>{
                          const num=idx+1;
                          const zona=p.Zona || 'SIN ZONA';
                          const color=colorPorZona[zona] || '#3b82f6';
                          const total=Number(p.Total || 0);
                          const nombre=(p.Nombre || '').trim();
                          const descripcion=(p.Descripcion || '');
                          const distribucion=(p.Distribucion || '');

                          const fs=num >= 100 ? 7 : (num >= 10 ? 8 : 10);

                          const icon=L.divIcon({
                            className:'',
                            html:'<svg width="26" height="26" viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg">' +
                                 '<circle cx="13" cy="13" r="11" fill="' + color + '" stroke="#fff" stroke-width="2"/>' +
                                 '<text x="13" y="13" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="' + fs + '" font-family="Segoe UI" font-weight="700">' + num + '</text>' +
                                 '</svg>',
                            iconSize:[26,26],
                            iconAnchor:[13,13]
                          });

                          const marker=L.marker([p.Latitud,p.Longitud],{icon});
                          bounds.push([p.Latitud,p.Longitud]);

                          const palabras=nombre.split(' ');
                          const l1=palabras.slice(0,2).join(' ');
                          const l2=palabras.slice(2).join(' ');
                          const distrib=distribucion ? '<br><span style="color:#94e4b0;font-size:10px">' + distribucion + '</span>' : '';
                          const totalHtml = total ? '<br><span style="color:#fbbf24;font-size:10px;font-weight:700">S/ ' + total.toFixed(2) + '</span>' : '';
                          const tooltipHtml = '<span style="color:#fbbf24;font-weight:700">' + num + '</span> ' + (l2 ? '<b>' + l1 + '</b><br>' + l2 + distrib + totalHtml : '<b>' + l1 + '</b>' + distrib + totalHtml);

                          marker.bindTooltip(tooltipHtml,{
                            permanent:false,
                            direction:'top',
                            offset:[0,-14],
                            className:'leaflet-tooltip-custom'
                          });

                          marker.bindPopup(
                            '<div class="popup-content">' +
                            '<strong>' + num + ' - ' + nombre + '</strong><br>' +
                            '<span class="popup-zona">' + zona + '</span><br>' +
                            descripcion + '<br>' +
                            distribucion + '<br>' +
                            '<span class="popup-total">S/ ' + total.toFixed(2) + '</span>' +
                            '</div>',
                            {maxWidth:260}
                          );

                          marker.addTo(mapa);
                        });
