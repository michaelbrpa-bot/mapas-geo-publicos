                        const mapa=L.map('mapa').setView([-9.5,-77.5],6);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
                          attribution:'OpenStreetMap',
                          maxZoom:19
                        }).addTo(mapa);

                        const zonasUnicas=[...new Set(datosMapa.map(p => p.Zona || 'SIN ZONA'))].sort();
                        const colorPorZona={};
                        zonasUnicas.forEach((z,i)=> colorPorZona[z]=PALETA[i % PALETA.length]);

                        const bounds=[];

                        datosMapa.forEach((p,idx)=>{
                          const num=idx+1;
                          const zona=p.Zona || 'SIN ZONA';
                          const color=colorPorZona[zona] || '#3b82f6';
                          
                          // 🔹 Variables restauradas para el Popup
                          const total=Number(p.Total || 0);
                          const nombre=(p.Nombre || '').trim();
                          const descripcion=(p.Descripcion || '');
                          const distribucion=(p.Distribucion || '');
                          const doi=(p.Doi || '');
                          //const fechaCc=(p.FechaCc || '');

                          const fs=num >= 100 ? 7 : (num >= 10 ? 8 : 10);

                          const icon=L.divIcon({
                            className:'',
                            html:'<svg width="26" height="26" viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg">' +
                                 '<circle cx="13" cy="13" r="11" fill="' + color + '" stroke="#fff" stroke-width="2"/>' +
                                 '<text x="13" y="13" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="' + fs + '" font-family="Segoe UI,sans-serif" font-weight="700">' + num + '</text>' +
                                 '</svg>',
                            iconSize:[26,26],
                            iconAnchor:[13,13]
                          });

                          const marker=L.marker([p.Latitud,p.Longitud],{icon});
                          bounds.push([p.Latitud,p.Longitud]);

                          // 🔹 Restaurado solo el Popup (al hacer clic)
                          marker.bindPopup(
                            '<div class="popup-content">' +
                            '<strong>' + num + ' - ' + nombre + '</strong><br>' +

                            '<span class="popup-zona">' + zona + '</span><br>' +
                            descripcion + '<br>' +


                            'DOI: ' + doi + '<br>' +
                            //fechaCc + '<br>' +
                            distribucion + '<br>' +
                            '<span class="popup-total">S/ ' + total.toFixed(2) + '</span>' +
                            '</div>',
                            {maxWidth:260}
                          );

                          marker.addTo(mapa);
                        });

                        if(bounds.length > 0){
                          mapa.fitBounds(bounds,{padding:[30,30]});
                        }

                        let textoVehiculo = '';
                        let textoFecha = '';

                        if(datosTodos.length > 0) {
                            const placa = datosTodos[0].Placa || '';
                            const conductor = datosTodos[0].Conductor || '';
                            if(placa || conductor) textoVehiculo = `[${placa}] ${conductor}`;

                            textoFecha = datosTodos[0].FechaCc || '';
                        }
                        
                        if(!textoFecha) {
                            textoFecha = new Date().toLocaleDateString('es-PE', {day:'2-digit', month:'2-digit', year:'numeric'});
                        }

                        document.getElementById('info-fecha').textContent = textoFecha;

                        const lblVehiculo = document.getElementById('info-vehiculo');
                        lblVehiculo.textContent = textoVehiculo;
                        if(!textoVehiculo) lblVehiculo.style.display = 'none';

                        const totalGeneralAbsoluto = datosTodos.reduce((s,p)=> s + Number(p.Total || 0), 0);

                        const zonaLabel = zonasUnicas.length === 1 ? ('Zona ' + zonasUnicas[0]) : (zonasUnicas.length + ' zonas');
                        document.getElementById('titulo').textContent='Mapa ' + zonaLabel;
                        document.getElementById('inf').textContent=datosMapa.length + ' puntos en mapa · ' + datosTodos.length + ' registros en consulta';
                        document.getElementById('tot').textContent='Total S/ ' + totalGeneralAbsoluto.toFixed(2);
