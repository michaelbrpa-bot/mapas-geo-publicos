<!DOCTYPE html>
                        <html lang='es'>
                        <head>
                        <meta charset='UTF-8'>
                        <meta name='viewport' content='width=device-width, initial-scale=1.0'>
                        <title>Mapa Geo</title>
                        <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'/>
                        <style>
                        *{margin:0;padding:0;box-sizing:border-box;}
                        
                        /* 🔹 CORRECCIÓN MOBILE: Usamos 100dvh y overflow:hidden para que el mapa no empuje el pie fuera de la pantalla */
                        body{font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;height:100dvh;overflow:hidden;}
                        
                        /* Cabecera superior */
                        #cab{background:#fff;border-bottom:1px solid #dde2ea;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;z-index:1000;}
                        .titulo-mapa{font-size:15px;font-weight:800;color:#1e293b;letter-spacing:0.5px;}
                        .etiqueta-box{background:#f1f5f9;padding:3px 8px;border-radius:4px;font-size:12px;font-weight:700;color:#334155;border:1px solid #cbd5e1;}
                        .info-derecha{margin-left:auto;display:flex;align-items:center;gap:12px;}
                        #inf{font-size:11px;color:#64748b;}

                       #tot{font-size:13px;color:#000000;font-weight:normal;background:#dcfce3;padding:3px 8px;border-radius:4px;}
                        
                        /* Contenedor del Mapa */
                        #mapa{flex:1;width:100%;z-index:1;}
                        
                        /* 🔹 CORRECCIÓN ESTÉTICA Y MOBILE: Pie de página blanco, con flex-wrap y scroll si hay muchas zonas */
                        #pie{background:#fff;border-top:1px solid #dde2ea;color:#334155;padding:8px 14px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap;max-height:25vh;overflow-y:auto;z-index:1000;}
                        .lbl-zonas{color:#1e293b;font-weight:800;letter-spacing:1px;}
                        
                        /* Estilos del Popup */
                        .popup-content{font-size:12px;line-height:1.6;min-width:170px;}
                        .popup-content strong{font-size:13px;color:#1e293b;}
                        .popup-zona{color:#3b82f6;font-weight:600;}
                        .popup-total{color:#16a34a;font-weight:700;}
                        </style>
                        </head>
                        <body>
                        
                        <div id='cab'>
                          <span class='titulo-mapa'>Ruta:</span>
                          <span id='info-fecha' class='etiqueta-box'></span>
                          <span id='info-vehiculo' class='etiqueta-box'></span>
                          <div class='info-derecha'>
                              <span id='inf'></span>
                              <span id='tot'></span>
                          </div>
                        </div>

                        <div id='mapa'></div>

                        <div id='pie'>
                            <span class='lbl-zonas'>ZONAS:</span>
                            <span id='info-zonas-pie'></span>
                        </div>

                        <script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script>
                        <script>
                        const PALETA=['#3b82f6','#ef4444','#16a34a','#f59e0b','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316','#0ea5e9','#a855f7','#14b8a6'];
                        const datosMapa = [];
                        const datosTodos = [{"FechaCc":"17/06/2026","Doi":"44543330","Nombre":"ACOSTA LARA, LIDIA ELIZABETH                                                                        ","Descripcion":"AV LAS MALVINAS 101 GUADALUPE","Zona":"M.SEOANE GUADALUPE","Total":0.0,"Distribucion":"DISMAR[0]-LIDER[1]","Latitud":0.0,"Longitud":0.0,"Placa":"T3V933","Conductor":"BALTAZAR VALDEZ, PAUL ALEXANDER"},{"FechaCc":"17/06/2026","Doi":"45258844","Nombre":"MOZOMBITE LOPEZ, JOSE ANTONIO                                                                       ","Descripcion":"QUEQUEN 395","Zona":"CHEPEN MAYORISTA,MERCADOS","Total":113.34,"Distribucion":"DISMAR[1]-LIDER[0]","Latitud":0.0,"Longitud":0.0,"Placa":"T3V933","Conductor":"BALTAZAR VALDEZ, PAUL ALEXANDER"}];

                        const mapa=L.map('mapa').setView([-9.5,-77.5],6);
                        
                                        // 🔹 SERVIDORES DE GOOGLE MAPS (Ultra rápidos)
                                        L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
                                          attribution:'Google Maps',
                                          maxZoom:20
                                        }).addTo(mapa);

                        const zonasUnicas=[...new Set(datosMapa.map(p => p.Zona || 'SIN ZONA'))].sort();
                        const colorPorZona={};
                        zonasUnicas.forEach((z,i)=> colorPorZona[z]=PALETA[i % PALETA.length]);

                        const bounds=[];

                        datosMapa.forEach((p,idx)=>{
                          const num=idx+1;
                          const zona=p.Zona || 'SIN ZONA';
                          const color=colorPorZona[zona] || '#3b82f6';
                          
                          const total=Number(p.Total || 0);
                          const nombre=(p.Nombre || '').trim();
                          const descripcion=(p.Descripcion || '');
                          const distribucion=(p.Distribucion || '');
                          const doi=(p.Doi || '');
                          const fechaCc=(p.FechaCc || '');

                          const fs=num >= 100 ? 9 : (num >= 10 ? 11 : 13); // Fuente más grande

                                const icon=L.divIcon({
                                  className:'',
                                  html:'<svg width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">' +
                                       '<!-- Sombra base -->' +
                                       '<circle cx="18" cy="20" r="14" fill="rgba(0,0,0,0.4)"/>' + 
                                       '<!-- Círculo principal -->' +
                                       '<circle cx="18" cy="16" r="14" fill="' + color + '" stroke="#ffffff" stroke-width="2.5"/>' +
                                       '<!-- Texto -->' +
                                       '<text x="18" y="16" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="' + fs + '" font-family="Segoe UI,sans-serif" font-weight="900">' + num + '</text>' +
                                       '</svg>',
                                  iconSize:[36,36],
                                  iconAnchor:[18,20]
                                });

                          const marker=L.marker([p.Latitud,p.Longitud],{icon});
                          bounds.push([p.Latitud,p.Longitud]);

                          marker.bindPopup(
                            '<div class="popup-content">' +
                            '<strong>' + num + ' - ' + nombre + '</strong><br>' +
                            '<span class="popup-zona">' + zona + '</span><br>' +
                            descripcion + '<br>' +
                            'DOI: ' + doi + '<br>' +
                            fechaCc + '<br>' +
                            distribucion + '<br>' +
                            '<span class="popup-total">S/ ' + total.toFixed(2) + '</span>' +
                            '</div>',
                            {maxWidth:260}
                          );

                          marker.addTo(mapa);
                        });

                        if(bounds.length > 0){
                          mapa.fitBounds(bounds,{padding:[30,30]});
                        }

                        let textoVehiculo = '';
                        let textoFecha = '';

                        if(datosTodos.length > 0) {
                            const placa = datosTodos[0].Placa || '';
                            const conductor = datosTodos[0].Conductor || '';
                            if(placa || conductor) textoVehiculo = `[${placa}] ${conductor}`;

                            textoFecha = datosTodos[0].FechaCc || '';
                        }
                        
                        if(!textoFecha) {
                            textoFecha = new Date().toLocaleDateString('es-PE', {day:'2-digit', month:'2-digit', year:'numeric'});
                        }

                        document.getElementById('info-fecha').textContent = textoFecha;

                        const lblVehiculo = document.getElementById('info-vehiculo');
                        lblVehiculo.textContent = textoVehiculo;
                        if(!textoVehiculo) lblVehiculo.style.display = 'none';

                        const totalGeneralAbsoluto = datosTodos.reduce((s,p)=> s + Number(p.Total || 0), 0);
                        document.getElementById('inf').textContent = datosMapa.length + ' puntos en mapa de ' + datosTodos.length;
                        document.getElementById('tot').textContent = 'Total S/ ' + totalGeneralAbsoluto.toFixed(2);

                        document.getElementById('info-zonas-pie').textContent = zonasUnicas.join(' • ');

                        </script>
                        </body>
                        </html>
