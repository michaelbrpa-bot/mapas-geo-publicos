                        const mapa=L.map('mapa').setView([-9.5,-77.5],6);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
                          attribution:'OpenStreetMap',
                          maxZoom:19
                        }).addTo(mapa);

                        const zonasUnicas=[...new Set(datosMapa.map(p => p.Zona || 'SIN ZONA'))].sort();
                        const colorPorZona={};
                        zonasUnicas.forEach((z,i)=> colorPorZona[z]=PALETA[i % PALETA.length]);

                        const bounds=[];

                        datosMapa.forEach((p,idx)=>{
                          const num=idx+1;
                          const zona=p.Zona || 'SIN ZONA';
                          const color=colorPorZona[zona] || '#3b82f6';
                          const total=Number(p.Total || 0);
                          const nombre=(p.Nombre || '').trim();
                          const descripcion=(p.Descripcion || '');
                          const distribucion=(p.Distribucion || '');

                          const fs=num >= 100 ? 7 : (num >= 10 ? 8 : 10);

                          const icon=L.divIcon({
                            className:'',
                            html:'<svg width="26" height="26" viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg">' +
                                 '<circle cx="13" cy="13" r="11" fill="' + color + '" stroke="#fff" stroke-width="2"/>' +
                                 '<text x="13" y="13" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="' + fs + '" font-family="Segoe UI" font-weight="700">' + num + '</text>' +
                                 '</svg>',
                            iconSize:[26,26],
                            iconAnchor:[13,13]
                          });

                          const marker=L.marker([p.Latitud,p.Longitud],{icon});
                          bounds.push([p.Latitud,p.Longitud]);

                          const palabras=nombre.split(' ');
                          const l1=palabras.slice(0,2).join(' ');
                          const l2=palabras.slice(2).join(' ');
                          const distrib=distribucion ? '<br><span style="color:#94e4b0;font-size:10px">' + distribucion + '</span>' : '';
                          const totalHtml = total ? '<br><span style="color:#fbbf24;font-size:10px;font-weight:700">S/ ' + total.toFixed(2) + '</span>' : '';
                          const tooltipHtml = '<span style="color:#fbbf24;font-weight:700">' + num + '</span> ' + (l2 ? '<b>' + l1 + '</b><br>' + l2 + distrib + totalHtml : '<b>' + l1 + '</b>' + distrib + totalHtml);

                          marker.bindTooltip(tooltipHtml,{
                            permanent:false,
                            direction:'top',
                            offset:[0,-14],
                            className:'leaflet-tooltip-custom'
                          });

                          marker.bindPopup(
                            '<div class="popup-content">' +
                            '<strong>' + num + ' - ' + nombre + '</strong><br>' +
                            '<span class="popup-zona">' + zona + '</span><br>' +
                            descripcion + '<br>' +
                            distribucion + '<br>' +
                            '<span class="popup-total">S/ ' + total.toFixed(2) + '</span>' +
                            '</div>',
                            {maxWidth:260}
                          );

                          marker.addTo(mapa);
                        });

                        if(bounds.length > 0){
                          mapa.fitBounds(bounds,{padding:[30,30]});
                        }

                        // 🔹 CORRECCIÓN: El total de la cabecera también se basa en datosTodos
                        const totalGeneralAbsoluto = datosTodos.reduce((s,p)=> s + Number(p.Total || 0), 0);

                        const zonaLabel = zonasUnicas.length === 1 ? ('Zona ' + zonasUnicas[0]) : (zonasUnicas.length + ' zonas');
                        document.getElementById('titulo').textContent='Mapa ' + zonaLabel;

                        document.getElementById('tot').textContent='Total S/ ' + totalGeneralAbsoluto.toFixed(2);

                        function generarTablaDetalleTodos(datosTodos){
                          const hoy=new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'});
                          document.getElementById('det-subtitulo').textContent='Generado ' + hoy + ' · ' + datosTodos.length + ' registros en consulta';

                          const contenedor=document.getElementById('det-contenido');
                          contenedor.innerHTML='';

                          const datosOrdenados = datosTodos.map((p,idx)=>({
                            Zona: p.Zona || 'SIN ZONA',
                            Nombre: p.Nombre || '',
                            Descripcion: p.Descripcion || '',
                            Distribucion: p.Distribucion || '',
                            Total: Number(p.Total || 0),
                            Latitud: Number(p.Latitud || 0),
                            Longitud: Number(p.Longitud || 0),
                            num: idx + 1,
                            TieneGeo: Number(p.Latitud || 0) !== 0 && Number(p.Longitud || 0) !== 0
                          }));

                          const zonasTodos=[...new Set(datosOrdenados.map(p => p.Zona))].sort();
                          
                          // 🔹 CORRECCIÓN: Este es el total del pie de tabla
                          const totalGeneral = datosOrdenados.reduce((s,p)=> s + Number(p.Total || 0), 0);
                          document.getElementById('det-total-general').textContent='TOTAL GENERAL S/ ' + totalGeneral.toFixed(2);

                          zonasTodos.forEach(zona=>{
                            const puntosZona = datosOrdenados.filter(p => p.Zona === zona);
                            const subtotalZona = puntosZona.reduce((s,p)=> s + Number(p.Total || 0), 0);
                            const color = colorPorZona[zona] || '#94a3b8';

                            const header=document.createElement('div');
                            header.className='det-zona-header';
                            header.innerHTML =
                              '<div class="det-zona-dot" style="background:' + color + '"></div>' +
                              '<span>' + zona + '</span>' +
                              '<span style="margin-left:auto;color:#64748b;font-weight:400">' + puntosZona.length + ' registros</span>';
                            contenedor.appendChild(header);

                            const tabla=document.createElement('table');
                            tabla.className='det-table';
                            tabla.innerHTML =
                              '<thead>' +
                              '<tr>' +
                              '<th class="col-num">#</th>' +
                              '<th class="col-geo">Geo</th>' +
                              '<th>Nombre</th>' +
                              '<th>Dirección</th>' +
                              '<th class="col-dist">Distribución</th>' +
                              '<th class="col-total">Total S/</th>' +
                              '</tr>' +
                              '</thead>';

                            const tbody=document.createElement('tbody');

                            puntosZona.forEach(p=>{
                              const tr=document.createElement('tr');
                              // 🔹 CORRECCIÓN: Usamos ✔ y ✖ aquí también
                              tr.innerHTML =
                                '<td class="det-num col-num">' + p.num + '</td>' +
                                '<td class="col-geo ' + (p.TieneGeo ? 'det-geo-si' : 'det-geo-no') + '">' + (p.TieneGeo ? '✔' : '✖') + '</td>' +
                                '<td>' + p.Nombre + '</td>' +
                                '<td>' + p.Descripcion + '</td>' +
                                '<td class="col-dist">' + p.Distribucion + '</td>' +
                                '<td class="col-total">' + p.Total.toFixed(2) + '</td>';
                              tbody.appendChild(tr);
                            });

                            const trSub=document.createElement('tr');
                            trSub.innerHTML =
                              '<td colspan="5" class="det-total-zona">Subtotal ' + zona + '</td>' +
                              '<td class="det-total-zona">S/ ' + subtotalZona.toFixed(2) + '</td>';
                            tbody.appendChild(trSub);

                            tabla.appendChild(tbody);
                            contenedor.appendChild(tabla);
                          });
                        }

                        generarTablaDetalleTodos(datosTodos);
                        </script>
