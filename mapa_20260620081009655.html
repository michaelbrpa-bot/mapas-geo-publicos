                        *{margin:0;padding:0;box-sizing:border-box;}

                        /* Cabecera superior */
                        #cab{background:#fff;border-bottom:1px solid #dde2ea;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;z-index:1000;}

                        #tot{font-size:13px;color:#000000;font-weight:normal;background:#dcfce3;padding:3px 8px;border-radius:4px;}
                        
                        /* Contenedor del Mapa */
                        #mapa{flex:1;width:100%;z-index:1;}
                        
                        /* Pie de página para Zonas */
                        #pie{background:#fff;border-top:1px solid #dde2ea;color:#334155;padding:8px 14px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap;max-height:25vh;overflow-y:auto;z-index:1000;}
                        .lbl-zonas{color:#1e293b;font-weight:800;letter-spacing:1px;}
                        
                        /* Estilos del Popup */
                        .popup-content{font-size:12px;line-height:1.6;min-width:170px;}
                        .popup-content strong{font-size:13px;color:#1e293b;}
                        .popup-zona{color:#3b82f6;font-weight:600;}
                        .popup-total{color:#16a34a;font-weight:700;}
                        </style>

                        // 🔹 LÓGICA MAESTRA: Ordenamos por Zona y luego por Cliente
                        datosTodos.sort(function(a, b) {
                            var zA = String(a.Zona || 'SIN ZONA').toUpperCase();
                            var zB = String(b.Zona || 'SIN ZONA').toUpperCase();
                            
                            if (zA < zB) return -1;
                            if (zA > zB) return 1;
                            
                            // Desempate por Nombre de Cliente
                            var nA = String(a.Nombre || '').toUpperCase();
                            var nB = String(b.Nombre || '').toUpperCase();
                            
                            if (nA < nB) return -1;
                            if (nA > nB) return 1;
                            
                            return 0;
                        });

                        datosTodos.forEach(function(p, idx) {
                            p.numOficial = idx + 1;
                        });

                        // 🔹 El mapa extrae sus puntos de la lista principal ya ordenada
                        const datosMapa = datosTodos.filter(function(p) {
                            return Number(p.Latitud || 0) !== 0 && Number(p.Longitud || 0) !== 0;
                        });

                        const mapa=L.map('mapa').setView([-9.5,-77.5],6);
                        
                        L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
                          attribution:'Google Maps',
                          maxZoom:20
                        }).addTo(mapa);

                        const zonasUnicas=[...new Set(datosTodos.map(p => p.Zona || 'SIN ZONA'))].sort();
                        const colorPorZona={};
                        zonasUnicas.forEach((z,i)=> colorPorZona[z]=PALETA[i % PALETA.length]);

                        const bounds=[];

                        // 🔹 Modificado para usar p.numOficial
                        datosMapa.forEach((p)=>{
                          const num = p.numOficial; 
                          const zona=p.Zona || 'SIN ZONA';
                          const color=colorPorZona[zona] || '#3b82f6';
                          
                          const total=Number(p.Total || 0);
                          const nombre=(p.Nombre || '').trim();
                          const descripcion=(p.Descripcion || '');
                          const distribucion=(p.Distribucion || '');
                          const doi=(p.Doi || '');
                          const fechaCc=(p.FechaCc || '');
                          const rvVendedor=(p.Rv || ''); 

                          const fs=num >= 100 ? 9 : (num >= 10 ? 11 : 13);

                          const icon=L.divIcon({
                            className:'',
                            html:'<svg width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">' +
                                 '' +
                                 '<circle cx="18" cy="20" r="14" fill="rgba(0,0,0,0.4)"/>' + 
                                 '' +
                                 '<circle cx="18" cy="16" r="14" fill="' + color + '" stroke="#ffffff" stroke-width="2.5"/>' +
                                 '' +
                                 '<text x="18" y="16" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="' + fs + '" font-family="Segoe UI,sans-serif" font-weight="900">' + num + '</text>' +
                                 '</svg>',
                            iconSize:[36,36],
                            iconAnchor:[18,20]
                          });

                          const marker=L.marker([p.Latitud,p.Longitud],{icon});
                          bounds.push([p.Latitud,p.Longitud]);

                          const textoDistribucionPopup = rvVendedor ? distribucion + ' - ' + rvVendedor : distribucion;

                          marker.bindPopup(
                            '<div class="popup-content">' +
                            '<strong>' + num + ' - ' + nombre + '</strong><br>' +
                            '<span class="popup-zona">' + zona + '</span><br>' +
                            descripcion + '<br>' +
                            'DOI: ' + doi + '<br>' +
                            fechaCc + '<br>' +
                            textoDistribucionPopup + '<br>' +
                            '<span class="popup-total">S/ ' + total.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '</span>' +
                            '</div>',
                            {maxWidth:260}
                          );

                          marker.addTo(mapa);
                        });

                        if(bounds.length > 0){
                          mapa.fitBounds(bounds,{padding:[30,30]});
                        }

                        let textoVehiculo = '';
                        let textoFecha = '';

                        if(datosTodos.length > 0) {
                            const placa = datosTodos[0].Placa || '';
                            const conductor = datosTodos[0].Conductor || '';
                            if(placa || conductor) textoVehiculo = `[${placa}] ${conductor}`;

                            textoFecha = datosTodos[0].FechaCc || '';
                        }
                        
                        if(!textoFecha) {
                            textoFecha = new Date().toLocaleDateString('es-PE', {day:'2-digit', month:'2-digit', year:'numeric'});
                        }

                        document.getElementById('info-fecha').textContent = textoFecha;

                        const lblVehiculo = document.getElementById('info-vehiculo');
                        lblVehiculo.textContent = textoVehiculo;
                        if(!textoVehiculo) lblVehiculo.style.display = 'none';

                        const totalGeneralAbsoluto = datosTodos.reduce((s,p)=> s + Number(p.Total || 0), 0);
                        document.getElementById('inf').textContent = datosMapa.length + ' puntos en mapa de ' + datosTodos.length;
                        document.getElementById('tot').textContent = 'Total S/ ' + totalGeneralAbsoluto.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

                        document.getElementById('info-zonas-pie').textContent = zonasUnicas.join(' • ');

                        </script>
