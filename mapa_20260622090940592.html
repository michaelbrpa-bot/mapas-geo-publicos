<!DOCTYPE html>
                        <html lang='es'>
                        <head>
                        <meta charset='UTF-8'>
                        <meta name='viewport' content='width=device-width, initial-scale=1.0'>
                        <title>Mapa Geo</title>
                        <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'/>
                        <style>
                        *{margin:0;padding:0;box-sizing:border-box;}
                        body{font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;height:100dvh;overflow:hidden;}
                        
                        /* Cabecera superior */
                        #cab{background:#fff;border-bottom:1px solid #dde2ea;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;z-index:1000;}
                        .titulo-mapa{font-size:15px;font-weight:normal;color:#1e293b;letter-spacing:0.5px;}
                        .etiqueta-box{background:#f1f5f9;padding:3px 8px;border-radius:4px;font-size:12px;font-weight:700;color:#334155;border:1px solid #cbd5e1;}
                        .info-derecha{margin-left:auto;display:flex;align-items:center;gap:12px;}
                        #inf{font-size:11px;color:#64748b;}
                        #tot{font-size:13px;color:#000000;font-weight:normal;background:#dcfce3;padding:3px 8px;border-radius:4px;}
                        
                        /* Contenedor del Mapa */
                        #mapa{flex:1;width:100%;z-index:1;}
                        
                        /* Pie de página para Zonas */
                        #pie{background:#fff;border-top:1px solid #dde2ea;color:#334155;padding:8px 14px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap;max-height:25vh;overflow-y:auto;z-index:1000;}
                        .lbl-zonas{color:#1e293b;font-weight:800;letter-spacing:1px;}
                        
                        /* Estilos del Popup */
                        .popup-content{font-size:12px;line-height:1.6;min-width:170px;}
                        .popup-content strong{font-size:13px;color:#1e293b;}
                        .popup-zona{color:#3b82f6;font-weight:600;}
                        .popup-total{color:#16a34a;font-weight:700;}
                        </style>
                        </head>
                        <body>
                        
                        <div id='cab'>
                          <span class='titulo-mapa'>Preventa:</span>
                          <span id='info-fecha' class='etiqueta-box'></span>
                          <span id='info-vehiculo' class='etiqueta-box'></span>
                          <div class='info-derecha'>
                              <span id='inf'></span>
                              <span id='tot'></span>
                          </div>
                        </div>

                        <div id='mapa'></div>

                        <div id='pie'>
                            <span class='lbl-zonas'>ZONAS:</span>
                            <span id='info-zonas-pie'></span>
                        </div>

                        <script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script>
                        <script>
                        const PALETA=['#3b82f6','#ef4444','#16a34a','#f59e0b','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316','#0ea5e9','#a855f7','#14b8a6'];
                        
                        // 🔹 LÓGICA MAESTRA: Recibir, Ordenar por Zona y Asignar Número Oficial
                        const datosTodos = [{"FechaCc":"20/06/2026","Doi":"00859665","Nombre":"JULCA MELCHOR, RAQUEL                                                                               ","Descripcion":"MERCADO Nº 03 P-J FILA C - HUAYCO","Zona":"MERCADO HUAYCO","Total":74.2,"Distribucion":"Dismar[1]-Lider[0]","Rv":"PRADO LOZANO, RENE DIOGENES","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"00970262","Nombre":"MORI CORDOVA ELENSI                                                                                 ","Descripcion":"PABELLON I FILA A  PSTO 16 - 17 - MCDO HUAYCO","Zona":"MERCADO HUAYCO","Total":12.1,"Distribucion":"Dismar[1]-Lider[0]","Rv":"PRADO LOZANO, RENE DIOGENES","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"01067420","Nombre":"DIAZ AGUILA AMELIA                                                                                  ","Descripcion":"MERCADO 3 PTO.C-9-10/HUAYCO","Zona":"MERCADO HUAYCO","Total":60.98,"Distribucion":"Dismar[1]-Lider[0]","Rv":"PRADO LOZANO, RENE DIOGENES","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"01070532","Nombre":"OCMIN SANDOVAL, ALICIA                                                                              ","Descripcion":"PSTO. 32 PABELLON J FILA C- MCDO. HUAYCO","Zona":"MERCADO HUAYCO","Total":16.42,"Distribucion":"Dismar[1]-Lider[0]","Rv":"PRADO LOZANO, RENE DIOGENES","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"01072449","Nombre":"PEZO TORRES ELIA                                                                                    ","Descripcion":"JR.HUALLAGA PTO.D-18-MCDO.3-HUAYCO","Zona":"MERCADO HUAYCO","Total":32.7,"Distribucion":"Dismar[1]-Lider[0]","Rv":"PRADO LOZANO, RENE DIOGENES","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"01086930","Nombre":"PAREDES FLORES DE ISUIZA JUANITA                                                                    ","Descripcion":"JR. MERCADO 3 FILA J","Zona":"MERCADO HUAYCO","Total":149.94,"Distribucion":"Dismar[1]-Lider[0]","Rv":"PRADO LOZANO, RENE DIOGENES","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"01099142","Nombre":"PUTPAÑA MORI, REULER                                                                                ","Descripcion":"MCDO. N1 AB-11","Zona":"BELLAVISTA - MAYOR","Total":12.1,"Distribucion":"Dismar[1]-Lider[0]","Rv":"PRADO LOZANO, RENE DIOGENES","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"01273809","Nombre":"ÑONTOL QUIROZ JULIANA                                                                               ","Descripcion":"MERCADO 3 - PABELLON H - FILA B - PUESTO 1","Zona":"MERCADO HUAYCO","Total":36.1,"Distribucion":"Dismar[1]-Lider[0]","Rv":"PRADO LOZANO, RENE DIOGENES","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"10468377565","Nombre":"GAONA  HIJUELA, TULIO                                                                               ","Descripcion":"PABELLON A PUESTO 4 JR HUALLAGA - MCDO HUAYCO","Zona":"MERCADO HUAYCO","Total":160.35,"Distribucion":"Dismar[1]-Lider[0]","Rv":"PRADO LOZANO, RENE DIOGENES","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"20494140307","Nombre":"COMERCIALIZADORA SAVAZ SOCIEDAD ANONIMA CERRADA                                                     ","Descripcion":"JR. SANTA ROSA NRO. 546","Zona":"TARAPOTO MAYORISTAS","Total":361.8,"Distribucion":"Dismar[1]-Lider[0]","Rv":"SIMON NORIEGA, FRANCISCO MANUEL","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"20606021713","Nombre":"LA CASA DE LAS VERDURAS E.I.R.L.                                                                    ","Descripcion":"JR. NICOLAS DE PIEROLA NRO. 440","Zona":"MERCADO NRO. 2","Total":224.5,"Distribucion":"Dismar[1]-Lider[0]","Rv":"SIMON NORIEGA, FRANCISCO MANUEL","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"42268077","Nombre":"ALTAMIRANO CHAVEZ, VILMA                                                                            ","Descripcion":"JR. VENCEDORES DE COMAINAS CDR. 4 - ESQ. CALLE ILO","Zona":"TARAPOTO MAYORISTAS","Total":1335.74,"Distribucion":"Dismar[1]-Lider[0]","Rv":"SIMON NORIEGA, FRANCISCO MANUEL","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"42779119","Nombre":"CARRASCO TORRES, FLOR YAQUELINE                                                                     ","Descripcion":"JR. ABANCAY CD. 4 - MDO. HUAYCO","Zona":"TARAPOTO MAYORISTAS","Total":2180.0,"Distribucion":"Dismar[1]-Lider[0]","Rv":"SIMON NORIEGA, FRANCISCO MANUEL","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"44044563","Nombre":"AREVALO PEREZ, JOB                                                                                  ","Descripcion":"JR. ILO CDR. 1-MCD. HUAYCO","Zona":"MERCADO HUAYCO","Total":12.1,"Distribucion":"Dismar[1]-Lider[0]","Rv":"PRADO LOZANO, RENE DIOGENES","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"44716860","Nombre":"RUVIO HORNA, DEYSI                                                                                  ","Descripcion":"JR. HUALLAGA 483","Zona":"MERCADO HUAYCO","Total":48.38,"Distribucion":"Dismar[1]-Lider[0]","Rv":"PRADO LOZANO, RENE DIOGENES","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"45894708","Nombre":"FLORES HUANCA, FELICITA                                                                             ","Descripcion":"JR HILO#176 - HUAYCO","Zona":"MERCADO HUAYCO","Total":130.34,"Distribucion":"Dismar[1]-Lider[0]","Rv":"PRADO LOZANO, RENE DIOGENES","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"48196753","Nombre":"ALTAMIRANO DELGADO, ANEIDA                                                                          ","Descripcion":"JR. ILO FRENTE","Zona":"MERCADO HUAYCO","Total":12.1,"Distribucion":"Dismar[1]-Lider[0]","Rv":"PRADO LOZANO, RENE DIOGENES","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"71240984","Nombre":"JULCA MORI LIBIA                                                                                    ","Descripcion":"JR.HUALLAGA PTO.3 MCDO.HUAYCO","Zona":"MERCADO HUAYCO","Total":12.1,"Distribucion":"Dismar[1]-Lider[0]","Rv":"PRADO LOZANO, RENE DIOGENES","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"},{"FechaCc":"20/06/2026","Doi":"80506168","Nombre":"ZUMBA OJANAMA ESTELA                                                                                ","Descripcion":"MERCADO 3 FILA.1 PUESTO 18","Zona":"MERCADO HUAYCO","Total":35.2,"Distribucion":"Dismar[1]-Lider[0]","Rv":"PRADO LOZANO, RENE DIOGENES","Latitud":0.0,"Longitud":0.0,"Placa":"T7C839","Conductor":"AGAPITO SANGAMA, SINARAHUA"}];

                        // 🔹 LÓGICA MAESTRA: Ordenamos por Zona y luego por Cliente
                        datosTodos.sort(function(a, b) {
                            var zA = String(a.Zona || 'SIN ZONA').toUpperCase();
                            var zB = String(b.Zona || 'SIN ZONA').toUpperCase();
                            
                            if (zA < zB) return -1;
                            if (zA > zB) return 1;
                            
                            // Desempate por Nombre de Cliente
                            var nA = String(a.Nombre || '').toUpperCase();
                            var nB = String(b.Nombre || '').toUpperCase();
                            
                            if (nA < nB) return -1;
                            if (nA > nB) return 1;
                            
                            return 0;
                        });

                        datosTodos.forEach(function(p, idx) {
                            p.numOficial = idx + 1;
                        });

                        // 🔹 El mapa extrae sus puntos de la lista principal ya ordenada
                        const datosMapa = datosTodos.filter(function(p) {
                            return Number(p.Latitud || 0) !== 0 && Number(p.Longitud || 0) !== 0;
                        });

                        const mapa=L.map('mapa').setView([-9.5,-77.5],6);
                        
                        L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
                          attribution:'Google Maps',
                          maxZoom:20
                        }).addTo(mapa);

                        const zonasUnicas=[...new Set(datosTodos.map(p => p.Zona || 'SIN ZONA'))].sort();
                        const colorPorZona={};
                        zonasUnicas.forEach((z,i)=> colorPorZona[z]=PALETA[i % PALETA.length]);

                        const bounds=[];

                        // 🔹 Modificado para usar p.numOficial
                        datosMapa.forEach((p)=>{
                          const num = p.numOficial; 
                          const zona=p.Zona || 'SIN ZONA';
                          const color=colorPorZona[zona] || '#3b82f6';
                          
                          const total=Number(p.Total || 0);
                          const nombre=(p.Nombre || '').trim();
                          const descripcion=(p.Descripcion || '');
                          const distribucion=(p.Distribucion || '');
                          const doi=(p.Doi || '');
                          const fechaCc=(p.FechaCc || '');
                          const rvVendedor=(p.Rv || ''); 

                          const fs=num >= 100 ? 9 : (num >= 10 ? 11 : 13);

                          const icon=L.divIcon({
                            className:'',
                            html:'<svg width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">' +
                                 '' +
                                 '<circle cx="18" cy="20" r="14" fill="rgba(0,0,0,0.4)"/>' + 
                                 '' +
                                 '<circle cx="18" cy="16" r="14" fill="' + color + '" stroke="#ffffff" stroke-width="2.5"/>' +
                                 '' +
                                 '<text x="18" y="16" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="' + fs + '" font-family="Segoe UI,sans-serif" font-weight="900">' + num + '</text>' +
                                 '</svg>',
                            iconSize:[36,36],
                            iconAnchor:[18,20]
                          });

                          const marker=L.marker([p.Latitud,p.Longitud],{icon});
                          bounds.push([p.Latitud,p.Longitud]);

                          const textoDistribucionPopup = rvVendedor ? distribucion + ' - ' + rvVendedor : distribucion;

                          marker.bindPopup(
                            '<div class="popup-content">' +
                            '<strong>' + num + ' - ' + nombre + '</strong><br>' +
                            '<span class="popup-zona">' + zona + '</span><br>' +
                            descripcion + '<br>' +
                            'DOI: ' + doi + '<br>' +
                            fechaCc + '<br>' +
                            textoDistribucionPopup + '<br>' +
                            '<span class="popup-total">S/ ' + total.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '</span>' +
                            '</div>',
                            {maxWidth:260}
                          );

                          marker.addTo(mapa);
                        });

                        if(bounds.length > 0){
                          mapa.fitBounds(bounds,{padding:[30,30]});
                        }

                        let textoVehiculo = '';
                        let textoFecha = '';

                        if(datosTodos.length > 0) {
                            const placa = datosTodos[0].Placa || '';
                            const conductor = datosTodos[0].Conductor || '';
                            if(placa || conductor) textoVehiculo = `[${placa}] ${conductor}`;

                            textoFecha = datosTodos[0].FechaCc || '';
                        }
                        
                        if(!textoFecha) {
                            textoFecha = new Date().toLocaleDateString('es-PE', {day:'2-digit', month:'2-digit', year:'numeric'});
                        }

                        document.getElementById('info-fecha').textContent = textoFecha;

                        const lblVehiculo = document.getElementById('info-vehiculo');
                        lblVehiculo.textContent = textoVehiculo;
                        if(!textoVehiculo) lblVehiculo.style.display = 'none';

                        const totalGeneralAbsoluto = datosTodos.reduce((s,p)=> s + Number(p.Total || 0), 0);
                        document.getElementById('inf').textContent = datosMapa.length + ' puntos en mapa de ' + datosTodos.length;
                        document.getElementById('tot').textContent = 'Total S/ ' + totalGeneralAbsoluto.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

                        document.getElementById('info-zonas-pie').textContent = zonasUnicas.join(' • ');

                        </script>
                        </body>
                        </html>
