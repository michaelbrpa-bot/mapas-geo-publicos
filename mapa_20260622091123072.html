<!DOCTYPE html>
                        <html lang='es'>
                        <head>
                        <meta charset='UTF-8'>
                        <meta name='viewport' content='width=device-width, initial-scale=1.0'>
                        <title>Mapa Geo</title>
                        <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'/>
                        <style>
                        *{margin:0;padding:0;box-sizing:border-box;}
                        body{font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;height:100dvh;overflow:hidden;}
                        
                        /* Cabecera superior */
                        #cab{background:#fff;border-bottom:1px solid #dde2ea;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;z-index:1000;}
                        .titulo-mapa{font-size:15px;font-weight:normal;color:#1e293b;letter-spacing:0.5px;}
                        .etiqueta-box{background:#f1f5f9;padding:3px 8px;border-radius:4px;font-size:12px;font-weight:700;color:#334155;border:1px solid #cbd5e1;}
                        .info-derecha{margin-left:auto;display:flex;align-items:center;gap:12px;}
                        #inf{font-size:11px;color:#64748b;}
                        #tot{font-size:13px;color:#000000;font-weight:normal;background:#dcfce3;padding:3px 8px;border-radius:4px;}
                        
                        /* Contenedor del Mapa */
                        #mapa{flex:1;width:100%;z-index:1;}
                        
                        /* Pie de página para Zonas */
                        #pie{background:#fff;border-top:1px solid #dde2ea;color:#334155;padding:8px 14px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap;max-height:25vh;overflow-y:auto;z-index:1000;}
                        .lbl-zonas{color:#1e293b;font-weight:800;letter-spacing:1px;}
                        
                        /* Estilos del Popup */
                        .popup-content{font-size:12px;line-height:1.6;min-width:170px;}
                        .popup-content strong{font-size:13px;color:#1e293b;}
                        .popup-zona{color:#3b82f6;font-weight:600;}
                        .popup-total{color:#16a34a;font-weight:700;}
                        </style>
                        </head>
                        <body>
                        
                        <div id='cab'>
                          <span class='titulo-mapa'>Preventa:</span>
                          <span id='info-fecha' class='etiqueta-box'></span>
                          <span id='info-vehiculo' class='etiqueta-box'></span>
                          <div class='info-derecha'>
                              <span id='inf'></span>
                              <span id='tot'></span>
                          </div>
                        </div>

                        <div id='mapa'></div>

                        <div id='pie'>
                            <span class='lbl-zonas'>ZONAS:</span>
                            <span id='info-zonas-pie'></span>
                        </div>

                        <script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script>
                        <script>
                        const PALETA=['#3b82f6','#ef4444','#16a34a','#f59e0b','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316','#0ea5e9','#a855f7','#14b8a6'];
                        
                        // 🔹 LÓGICA MAESTRA: Recibir, Ordenar por Zona y Asignar Número Oficial
                        const datosTodos = [{"FechaCc":"20/06/2026","Doi":"10234428","Nombre":"ALTAMIRANO RUIZ, ANDREA                                                                             ","Descripcion":"VIA DE EVITAMIENTO # 100   HUAMACHUCO","Zona":"MARKAHUAMACHUCO","Total":281.2,"Distribucion":"Dismar[1]-Lider[0]","Rv":"MIÑANO ULLOA, MARILU DIANIRA","Latitud":-7.8185714,"Longitud":-78.0517881,"Placa":"T2I929","Conductor":"CONTRERAS RODRIGUEZ, ELSON OMAR"},{"FechaCc":"20/06/2026","Doi":"19572301","Nombre":"PAREDES RODRIGUEZ, TEONILA                                                                          ","Descripcion":"SANTA ANA FRENTE A PLATAFORMA   HUAMACHUCO","Zona":"","Total":148.8,"Distribucion":"Dismar[0]-Lider[1]","Rv":"MIÑANO ULLOA, MARILU DIANIRA","Latitud":0.0,"Longitud":0.0,"Placa":"T2I929","Conductor":"CONTRERAS RODRIGUEZ, ELSON OMAR"},{"FechaCc":"20/06/2026","Doi":"19685214","Nombre":"GONZALES MARREROS, ESPERANZA                                                                        ","Descripcion":"TACNA # 172","Zona":"MARKAHUAMACHUCO","Total":81.05,"Distribucion":"Dismar[0]-Lider[1]","Rv":"MIÑANO ULLOA, MARILU DIANIRA","Latitud":-7.8161611,"Longitud":-78.0527665,"Placa":"T2I929","Conductor":"CONTRERAS RODRIGUEZ, ELSON OMAR"},{"FechaCc":"20/06/2026","Doi":"40576034","Nombre":"GAYTAN  LEZAMA, MIRIAN  NOEMI                                                                       ","Descripcion":"BALTA TIENDA # 04-A   HUAMACHUCO","Zona":"HUAMACHUCO MAYORISTA","Total":382.0,"Distribucion":"Dismar[1]-Lider[0]","Rv":"MIÑANO ULLOA, MARILU DIANIRA","Latitud":-7.8111764,"Longitud":-78.0464191,"Placa":"T2I929","Conductor":"CONTRERAS RODRIGUEZ, ELSON OMAR"},{"FechaCc":"20/06/2026","Doi":"42473143","Nombre":"CHACON CONTRERAS, SANTOS HAYDEE                                                                     ","Descripcion":"ANDRÉS AVELINO CASERES 128","Zona":"RAMIRO PRIALE","Total":480.5,"Distribucion":"Dismar[1]-Lider[0]","Rv":"MIÑANO ULLOA, MARILU DIANIRA","Latitud":-7.8177983,"Longitud":-78.0520764,"Placa":"T2I929","Conductor":"CONTRERAS RODRIGUEZ, ELSON OMAR"},{"FechaCc":"20/06/2026","Doi":"42623136","Nombre":"CAIPO CAMPOS, BENIGNA                                                                               ","Descripcion":"AGUA DE LOS PAJARITOS #CDRA, 3 (PUERTA PLOMA) HUAMACHUCO","Zona":"OBELISCO","Total":453.8,"Distribucion":"Dismar[0]-Lider[1]","Rv":"MIÑANO ULLOA, MARILU DIANIRA","Latitud":-7.8117284,"Longitud":-78.0450849,"Placa":"T2I929","Conductor":"CONTRERAS RODRIGUEZ, ELSON OMAR"},{"FechaCc":"20/06/2026","Doi":"43991747","Nombre":"ROSADO  CARRION, HERMELINDA EULALIA                                                                 ","Descripcion":"CALLE LIMA # 1426 HUAMACHUCO","Zona":"MARKAHUAMACHUCO","Total":42.38,"Distribucion":"Dismar[1]-Lider[1]","Rv":"MIÑANO ULLOA, MARILU DIANIRA","Latitud":-7.8132467,"Longitud":-78.0535744,"Placa":"T2I929","Conductor":"CONTRERAS RODRIGUEZ, ELSON OMAR"},{"FechaCc":"20/06/2026","Doi":"44739296","Nombre":"CRUZ GRAOS, MIRIAM VILMA                                                                            ","Descripcion":"G. DE LA VEGA # 672 (BOTI PAMELA)","Zona":"","Total":452.18,"Distribucion":"Dismar[2]-Lider[0]","Rv":"MIÑANO ULLOA, MARILU DIANIRA","Latitud":-7.8118588,"Longitud":-78.046729,"Placa":"T2I929","Conductor":"CONTRERAS RODRIGUEZ, ELSON OMAR"},{"FechaCc":"20/06/2026","Doi":"46128873","Nombre":"BENITES SERIN, ANA  CECILIA                                                                         ","Descripcion":"CICLOVIA/ PASJ. SANTA MARINA # 135","Zona":"","Total":105.5,"Distribucion":"Dismar[0]-Lider[1]","Rv":"MIÑANO ULLOA, MARILU DIANIRA","Latitud":0.0,"Longitud":0.0,"Placa":"T2I929","Conductor":"CONTRERAS RODRIGUEZ, ELSON OMAR"},{"FechaCc":"20/06/2026","Doi":"47739614","Nombre":"OLANO PUERTA, MAX  ROLANDO                                                                          ","Descripcion":"VIA DE EVITAMIENTO Y TACNA CD 1","Zona":"","Total":111.9,"Distribucion":"Dismar[1]-Lider[0]","Rv":"MIÑANO ULLOA, MARILU DIANIRA","Latitud":0.0,"Longitud":0.0,"Placa":"T2I929","Conductor":"CONTRERAS RODRIGUEZ, ELSON OMAR"},{"FechaCc":"20/06/2026","Doi":"70227844","Nombre":"VASQUEZ RODRIGUES, FLOR                                                                             ","Descripcion":"G. DE LA VEGA # 636   HUAMACHUCO","Zona":"","Total":178.3,"Distribucion":"Dismar[1]-Lider[0]","Rv":"MIÑANO ULLOA, MARILU DIANIRA","Latitud":-7.8115828,"Longitud":-78.0472773,"Placa":"T2I929","Conductor":"CONTRERAS RODRIGUEZ, ELSON OMAR"},{"FechaCc":"20/06/2026","Doi":"71643957","Nombre":"CARDENAS VAILON, GUILLERMO                                                                          ","Descripcion":"SANTA ANA Y BOLIVAR  # 639  HUAMACHUCO","Zona":"","Total":1155.0,"Distribucion":"Dismar[0]-Lider[1]","Rv":"MIÑANO ULLOA, MARILU DIANIRA","Latitud":-7.810498,"Longitud":-78.0479177,"Placa":"T2I929","Conductor":"CONTRERAS RODRIGUEZ, ELSON OMAR"},{"FechaCc":"20/06/2026","Doi":"72022946","Nombre":"MURGA DE LA CRUZ, FIORELA  JUDITH                                                                   ","Descripcion":"CALLE PIURA #350","Zona":"","Total":84.27,"Distribucion":"Dismar[1]-Lider[1]","Rv":"MIÑANO ULLOA, MARILU DIANIRA","Latitud":-7.8126084,"Longitud":-78.0429844,"Placa":"T2I929","Conductor":"CONTRERAS RODRIGUEZ, ELSON OMAR"},{"FechaCc":"20/06/2026","Doi":"73052863","Nombre":"GUEVARA ARCE, JULISSA                                                                               ","Descripcion":"JR PIURA # 213 (ESQUINA TACNA)","Zona":"MARKAHUAMACHUCO","Total":174.86,"Distribucion":"Dismar[1]-Lider[1]","Rv":"MIÑANO ULLOA, MARILU DIANIRA","Latitud":-7.8155377,"Longitud":-78.0546259,"Placa":"T2I929","Conductor":"CONTRERAS RODRIGUEZ, ELSON OMAR"},{"FechaCc":"20/06/2026","Doi":"73094629","Nombre":"AVALOS RUBIO, HEISY                                                                                 ","Descripcion":"CA LIMA # 420","Zona":"MARKAHUAMACHUCO","Total":105.75,"Distribucion":"Dismar[1]-Lider[1]","Rv":"MIÑANO ULLOA, MARILU DIANIRA","Latitud":-7.8162383,"Longitud":-78.0535221,"Placa":"T2I929","Conductor":"CONTRERAS RODRIGUEZ, ELSON OMAR"},{"FechaCc":"20/06/2026","Doi":"80614276","Nombre":"GUZMAN SAGON, JESSICA RAQUEL                                                                        ","Descripcion":"BLONDE Y PINILLOS FRENTA A BAÑOS","Zona":"HUAMACHUCO MAYORISTA","Total":200.8,"Distribucion":"Dismar[1]-Lider[1]","Rv":"MIÑANO ULLOA, MARILU DIANIRA","Latitud":-7.8115408,"Longitud":-78.0454634,"Placa":"T2I929","Conductor":"CONTRERAS RODRIGUEZ, ELSON OMAR"}];

                        // 🔹 LÓGICA MAESTRA: Ordenamos por Zona y luego por Cliente
                        datosTodos.sort(function(a, b) {
                            var zA = String(a.Zona || 'SIN ZONA').toUpperCase();
                            var zB = String(b.Zona || 'SIN ZONA').toUpperCase();
                            
                            if (zA < zB) return -1;
                            if (zA > zB) return 1;
                            
                            // Desempate por Nombre de Cliente
                            var nA = String(a.Nombre || '').toUpperCase();
                            var nB = String(b.Nombre || '').toUpperCase();
                            
                            if (nA < nB) return -1;
                            if (nA > nB) return 1;
                            
                            return 0;
                        });

                        datosTodos.forEach(function(p, idx) {
                            p.numOficial = idx + 1;
                        });

                        // 🔹 El mapa extrae sus puntos de la lista principal ya ordenada
                        const datosMapa = datosTodos.filter(function(p) {
                            return Number(p.Latitud || 0) !== 0 && Number(p.Longitud || 0) !== 0;
                        });

                        const mapa=L.map('mapa').setView([-9.5,-77.5],6);
                        
                        L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
                          attribution:'Google Maps',
                          maxZoom:20
                        }).addTo(mapa);

                        const zonasUnicas=[...new Set(datosTodos.map(p => p.Zona || 'SIN ZONA'))].sort();
                        const colorPorZona={};
                        zonasUnicas.forEach((z,i)=> colorPorZona[z]=PALETA[i % PALETA.length]);

                        const bounds=[];

                        // 🔹 Modificado para usar p.numOficial
                        datosMapa.forEach((p)=>{
                          const num = p.numOficial; 
                          const zona=p.Zona || 'SIN ZONA';
                          const color=colorPorZona[zona] || '#3b82f6';
                          
                          const total=Number(p.Total || 0);
                          const nombre=(p.Nombre || '').trim();
                          const descripcion=(p.Descripcion || '');
                          const distribucion=(p.Distribucion || '');
                          const doi=(p.Doi || '');
                          const fechaCc=(p.FechaCc || '');
                          const rvVendedor=(p.Rv || ''); 

                          const fs=num >= 100 ? 9 : (num >= 10 ? 11 : 13);

                          const icon=L.divIcon({
                            className:'',
                            html:'<svg width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">' +
                                 '' +
                                 '<circle cx="18" cy="20" r="14" fill="rgba(0,0,0,0.4)"/>' + 
                                 '' +
                                 '<circle cx="18" cy="16" r="14" fill="' + color + '" stroke="#ffffff" stroke-width="2.5"/>' +
                                 '' +
                                 '<text x="18" y="16" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="' + fs + '" font-family="Segoe UI,sans-serif" font-weight="900">' + num + '</text>' +
                                 '</svg>',
                            iconSize:[36,36],
                            iconAnchor:[18,20]
                          });

                          const marker=L.marker([p.Latitud,p.Longitud],{icon});
                          bounds.push([p.Latitud,p.Longitud]);

                          const textoDistribucionPopup = rvVendedor ? distribucion + ' - ' + rvVendedor : distribucion;

                          marker.bindPopup(
                            '<div class="popup-content">' +
                            '<strong>' + num + ' - ' + nombre + '</strong><br>' +
                            '<span class="popup-zona">' + zona + '</span><br>' +
                            descripcion + '<br>' +
                            'DOI: ' + doi + '<br>' +
                            fechaCc + '<br>' +
                            textoDistribucionPopup + '<br>' +
                            '<span class="popup-total">S/ ' + total.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '</span>' +
                            '</div>',
                            {maxWidth:260}
                          );

                          marker.addTo(mapa);
                        });

                        if(bounds.length > 0){
                          mapa.fitBounds(bounds,{padding:[30,30]});
                        }

                        let textoVehiculo = '';
                        let textoFecha = '';

                        if(datosTodos.length > 0) {
                            const placa = datosTodos[0].Placa || '';
                            const conductor = datosTodos[0].Conductor || '';
                            if(placa || conductor) textoVehiculo = `[${placa}] ${conductor}`;

                            textoFecha = datosTodos[0].FechaCc || '';
                        }
                        
                        if(!textoFecha) {
                            textoFecha = new Date().toLocaleDateString('es-PE', {day:'2-digit', month:'2-digit', year:'numeric'});
                        }

                        document.getElementById('info-fecha').textContent = textoFecha;

                        const lblVehiculo = document.getElementById('info-vehiculo');
                        lblVehiculo.textContent = textoVehiculo;
                        if(!textoVehiculo) lblVehiculo.style.display = 'none';

                        const totalGeneralAbsoluto = datosTodos.reduce((s,p)=> s + Number(p.Total || 0), 0);
                        document.getElementById('inf').textContent = datosMapa.length + ' puntos en mapa de ' + datosTodos.length;
                        document.getElementById('tot').textContent = 'Total S/ ' + totalGeneralAbsoluto.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

                        document.getElementById('info-zonas-pie').textContent = zonasUnicas.join(' • ');

                        </script>
                        </body>
                        </html>
